<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac To</title>
    <link rel="stylesheet" href="sty.css"></link>
</head>
<body>
<div class="content">
    <div class="hds">
        <h1 id="hd">Tic Tac Toe</h1>
    </div>
    <p id="winmsg"></p>
    <div class="container">
        <div class="game">
            <button class="bt" id="box1"></button>
            <button class="bt" id="box2"></button>
            <button class="bt" id="box3"></button>
            <button class="bt" id="box4"></button>
            <button class="bt" id="box5"></button>
            <button class="bt" id="box6"></button>
            <button class="bt" id="box7"></button>
            <button class="bt" id="box8"></button>
            <button class="bt" id="box9"></button>
        </div>
    </div>
    <div class="controls">
        <button id="ngm" class="btns">New Game</button>
        <button id="rst" class="btns2">Reset</button>
    </div>


    



    <script src="apps.js"></script>
</body>
</html>
